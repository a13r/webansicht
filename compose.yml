services:
  webansicht:
    image: a13r/webansicht
    build: .
    ports:
      - "3030:3030"
    links:
      - mongo
    volumes:
      - ./config:/opt/app/config
      - ./data/import:/import
    restart: always
  mongo:
    image: mongo:4.4
    volumes:
      - ./data/configdb:/data/configdb
      - ./data/db:/data/db
    restart: always
